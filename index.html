<!DOCTYPE html>
<html lang="zh-CN">
  <head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>十方汇鉴</title>
<link rel="icon" type="image/png" href="icon/app_icon_round.png">
<link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="theme-home">

<!-- 侧边栏 -->
<aside class="sidebar">
  <div class="sidebar-header">
    <img src="icon/logo.png" alt="十方汇鉴" class="sidebar-logo">
    <span class="sidebar-title">十方汇鉴</span>
    <button class="sidebar-toggle" id="sidebarToggle">
      <i class="fas fa-chevron-left"></i>
    </button>
  </div>
  
  <nav class="sidebar-nav">
    <a class="nav-btn active" data-page="home" href="index.html">
      <i class="fas fa-home"></i>
      <span class="nav-text">首页</span>
    </a>
    <a class="nav-btn" data-page="dream" href="dreams.html">
      <i class="fas fa-rocket"></i>
      <span class="nav-text">梦想与征程</span>
    </a>
  </nav>
</aside>

<!-- 主内容区 -->
<main class="main-content">
  <!-- 顶部导航 - 首页不显示攻略、图鉴、数值、计时器标签 -->
  <header class="top-nav">
    <div class="top-nav-left">
      <h1 class="top-nav-title" id="pageTitle">十方汇鉴</h1>
    </div>
    
    <div class="top-nav-actions">
      <i class="fas fa-bell"></i>
      <i class="fas fa-cog"></i>
    </div>
  </header>

  <!-- 内容区域 -->
  <div class="page-content">
    <div class="home-page">
      <section class="hero-section">
        <div class="glow-effect glow-1"></div>
        <h2 class="hero-title">欢迎来到十方汇鉴</h2>
        <p class="hero-subtitle">探索无限可能，记录你的每一次征程。这里是你游戏旅程的最佳伴侣。</p>
      </section>

      <div class="card-grid">
        <div class="content-card">
          <div class="card-icon">
            <i class="fas fa-book"></i>
          </div>
          <h3 class="card-title">万物图鉴</h3>
          <p class="card-desc">收录所有角色、装备和道具的完整资料库，助力你的冒险之旅。</p>
        </div>

        <div class="content-card">
          <div class="card-icon">
            <i class="fas fa-book-open"></i>
          </div>
          <h3 class="card-title">攻略秘典</h3>
          <p class="card-desc">详细的游戏攻略和技巧分享，助你轻松应对各种挑战。</p>
        </div>

        <div class="content-card">
          <div class="card-icon">
            <i class="fas fa-calculator"></i>
          </div>
          <h3 class="card-title">数值计算</h3>
          <p class="card-desc">精准的角色数值分析和伤害计算工具，助你优化配装策略。</p>
        </div>

        <div class="content-card">
          <div class="card-icon">
            <i class="fas fa-clock"></i>
          </div>
          <h3 class="card-title">计时器</h3>
          <p class="card-desc">实用的活动计时和冷却提醒功能，不再错过任何重要时刻。</p>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="components.js"></script>
<script src="main.js"></script>
<script>
  Components.init({ currentPage: 'home', theme: 'home' });
</script>

</body>
</html>
